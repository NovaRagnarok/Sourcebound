name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest
        run: python -m pytest -q

  default-stack-smoke:
    name: Default Stack Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Start default stack services
        run: docker compose up -d postgres qdrant

      - name: Show compose service state
        run: docker compose ps

      - name: Run newcomer smoke
        run: ./scripts/newcomer_smoke.sh

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color postgres qdrant

      - name: Tear down default stack services
        if: always()
        run: docker compose down -v

  retrieval-regression:
    name: Retrieval Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run extraction-eval regression benchmark
        run: saw evaluate-extraction --dataset all --json-output

      - name: Upload extraction-eval suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extraction-eval-suite
          path: |
            runtime/extraction_evals/
          if-no-files-found: ignore

  internet-facing-compose:
    name: Internet-Facing Compose
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_WRITER_TOKEN: ci-writer-token
      APP_OPERATOR_TOKEN: ci-operator-token
      SOURCEBOUND_PUBLIC_HOST: "127.0.0.1"
      SOURCEBOUND_HTTP_PORT: "8080"
      SOURCEBOUND_HTTPS_PORT: "8443"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create temporary TLS material
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.tmp/tls"
          openssl req \
            -x509 \
            -nodes \
            -days 1 \
            -newkey rsa:2048 \
            -keyout "$GITHUB_WORKSPACE/.tmp/tls/sourcebound.key" \
            -out "$GITHUB_WORKSPACE/.tmp/tls/sourcebound.crt" \
            -subj "/CN=localhost"
          {
            echo "SOURCEBOUND_TLS_CERT_PATH=$GITHUB_WORKSPACE/.tmp/tls/sourcebound.crt"
            echo "SOURCEBOUND_TLS_KEY_PATH=$GITHUB_WORKSPACE/.tmp/tls/sourcebound.key"
          } >> "$GITHUB_ENV"

      - name: Validate compose config
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml config

      - name: Start Postgres and Qdrant
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml up -d postgres qdrant

      - name: Wait for Qdrant HTTP readiness
        run: |
          python - <<'PY'
          import time
          import urllib.request

          deadline = time.time() + 60
          url = "http://127.0.0.1:6333/collections"
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=5) as response:
                      if response.status == 200:
                          break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Qdrant did not become ready in time")
          PY

      - name: Seed the supported compose stack
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml run --rm app saw seed-dev-data

      - name: Verify the supported compose stack
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml run --rm app saw verify-default-stack

      - name: Start app and proxy
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml up -d --build app proxy

      - name: Show compose service state
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml ps

      - name: Wait for HTTPS proxy health endpoint
        run: |
          python - <<'PY'
          import json
          import ssl
          import time
          import urllib.request

          context = ssl._create_unverified_context()
          deadline = time.time() + 90
          url = "https://127.0.0.1:8443/health/runtime"
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=5, context=context) as response:
                      if response.status != 200:
                          raise RuntimeError(f"unexpected status {response.status}")
                      body = json.load(response)
                      if body.get("overall_status") == "ready":
                          break
              except Exception:
                  time.sleep(2)
          else:
              raise SystemExit("HTTPS proxy-backed runtime health did not become ready in time")
          PY

      - name: Check workspace entrypoint through HTTPS proxy
        run: |
          python - <<'PY'
          import ssl
          import urllib.request

          context = ssl._create_unverified_context()
          with urllib.request.urlopen("https://127.0.0.1:8443/workspace/", timeout=10, context=context) as response:
              if response.status != 200:
                  raise SystemExit(f"unexpected workspace status {response.status}")
          PY

      - name: Check HTTP redirects to the configured HTTPS host and port
        run: |
          python - <<'PY'
          import urllib.request

          class NoRedirect(urllib.request.HTTPRedirectHandler):
              def redirect_request(self, req, fp, code, msg, headers, newurl):
                  return None

          opener = urllib.request.build_opener(NoRedirect)
          request = urllib.request.Request("http://127.0.0.1:8080/workspace/")
          try:
              opener.open(request, timeout=10)
          except urllib.error.HTTPError as exc:
              if exc.code != 301:
                  raise SystemExit(f"unexpected redirect status {exc.code}")
              location = exc.headers.get("Location")
          else:
              raise SystemExit("expected an HTTP redirect but the request succeeded directly")

          expected = "https://127.0.0.1:8443/workspace/"
          if location != expected:
              raise SystemExit(f"unexpected redirect target {location!r}")
          PY

      - name: Check authenticated operator intake through HTTPS proxy
        run: |
          python - <<'PY'
          import json
          import os
          import ssl
          import urllib.request

          context = ssl._create_unverified_context()
          request = urllib.request.Request(
              "https://127.0.0.1:8443/v1/intake/text",
              data=json.dumps(
                  {
                      "title": "Deployment proof source",
                      "text": "This request proves the HTTPS proxy forwards authenticated operator intake.",
                  }
              ).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['APP_OPERATOR_TOKEN']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=15, context=context) as response:
              if response.status != 200:
                  raise SystemExit(f"unexpected intake status {response.status}")
              body = json.load(response)
          if not body.get("created_item"):
              raise SystemExit("authenticated operator intake did not return a created_item payload")
          PY

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml logs --no-color postgres qdrant app proxy

      - name: Tear down compose stack
        if: always()
        run: docker compose -f docker-compose.yml -f infra/compose/internet-facing.yml down -v
