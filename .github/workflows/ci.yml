name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Pytest
        run: python -m pytest -q

  default-stack-smoke:
    name: Default Stack Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Start default stack services
        run: docker compose up -d postgres qdrant

      - name: Show compose service state
        run: docker compose ps

      - name: Run newcomer smoke
        run: ./scripts/newcomer_smoke.sh

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color postgres qdrant

      - name: Tear down default stack services
        if: always()
        run: docker compose down -v
