worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    server {
        listen 80;
        server_name ${SOURCEBOUND_PUBLIC_HOST};
        return 301 https://${SOURCEBOUND_PUBLIC_HOST}:${SOURCEBOUND_HTTPS_PORT}$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name ${SOURCEBOUND_PUBLIC_HOST};

        ssl_certificate /etc/nginx/tls/sourcebound.crt;
        ssl_certificate_key /etc/nginx/tls/sourcebound.key;
        ssl_session_cache shared:TLS:10m;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        client_max_body_size 25m;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy no-referrer always;

        location / {
            proxy_pass http://app:8000;
            proxy_http_version 1.1;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
